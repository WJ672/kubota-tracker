<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubota B5000 Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f0;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: #E6481F;
            border-radius: 12px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header .sub { font-size: 13px; opacity: 0.85; }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .header-actions .btn-sm {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .header-actions .btn-sm:hover { background: rgba(255,255,255,0.2); }
        .header-actions .btn-sm:active { transform: scale(0.95); }
        .badge-status {
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
        }
        .badge-status.good { background: rgba(255,255,255,0.25); }
        .badge-status.warning { background: #ffc107; color: #333; }
        .badge-status.danger { background: #dc3545; color: white; }
        .tabs {
            display: flex;
            gap: 4px;
            background: white;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid #e5e0db;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #888;
        }
        .tab .icon { 
            font-size: 16px; 
            filter: grayscale(1);
            opacity: 0.6;
        }
        .tab.active {
            background: #E6481F;
            color: white;
        }
        .tab.active .icon {
            filter: grayscale(0);
            opacity: 1;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #e5e0db;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        .card-title .icon {
            filter: grayscale(1);
            opacity: 0.6;
            margin-right: 4px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .form-group label {
            font-size: 12px;
            color: #666;
            font-weight: 500;
            margin-bottom: 4px;
            display: block;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #e5e0db;
            border-radius: 8px;
            font-size: 14px;
            background: #f8f6f4;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #E6481F;
        }
        .form-group input:read-only {
            background: #FDE8E0;
            border-color: #E6481F;
            font-weight: 500;
            color: #E6481F;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: #E6481F;
            color: white;
            width: 100%;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary {
            background: #e5e0db;
            color: #333;
        }
        .record {
            background: #f8f6f4;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #E6481F;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .record-left {
            flex: 1;
        }
        .record-title { font-weight: 500; font-size: 14px; color: #333; }
        .record-meta { font-size: 12px; color: #888; margin-top: 2px; }
        .record-photos {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .record-photos img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            border: 0.5px solid #ddd;
            cursor: pointer;
        }
        .btn-danger {
            background: none;
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .empty { text-align: center; color: #888; padding: 30px 0; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; }
        .auto-badge {
            font-size: 9px;
            background: #FDE8E0;
            color: #E6481F;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 4px;
        }
        .latest-reading {
            font-size: 13px;
            color: #E6481F;
            font-weight: 500;
            margin-top: 4px;
            padding: 6px 10px;
            background: #FDE8E0;
            border-radius: 6px;
        }
        .photo-thumb-container {
            position: relative;
            display: inline-block;
        }
        .photo-remove {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            line-height: 18px;
            text-align: center;
        }
        .btn-photo {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid #E6481F;
            background: none;
            color: #E6481F;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn-photo:active { background: #FDE8E0; }
        .cost-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
            color: #555;
        }
        .cost-item .icon {
            filter: grayscale(1);
            opacity: 0.5;
            margin-right: 4px;
        }
        .cost-total {
            display: flex;
            justify-content: space-between;
            padding-top: 8px;
            margin-top: 8px;
            border-top: 2px solid #E6481F;
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }
        .cost-total .amount { color: #E6481F; }
        .hours-attachment {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 14px;
            color: #555;
        }
        .hours-attachment .value { font-weight: 500; color: #333; }
        
        /* ===== SERVICE STATUS ===== */
        .service-status-box {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid transparent;
        }
        .service-status-box.ok { 
            background: #d4edda; 
            border-color: #28a745;
            border-left: 4px solid #28a745;
        }
        .service-status-box.warning { 
            background: #fff3cd; 
            border-color: #ffc107;
            border-left: 4px solid #ffc107;
        }
        .service-status-box.danger { 
            background: #f8d7da; 
            border-color: #dc3545;
            border-left: 4px solid #dc3545;
        }
        .service-status-box .icon { 
            font-size: 28px; 
            filter: grayscale(0); 
            opacity: 1;
            flex-shrink: 0;
        }
        .service-status-box .info { flex: 1; }
        .service-status-box .info .status { 
            font-size: 16px; 
            font-weight: 700; 
        }
        .service-status-box .info .detail { 
            font-size: 13px; 
            color: #555; 
            margin-top: 2px;
        }
        .service-status-box.ok .info .status { color: #155724; }
        .service-status-box.warning .info .status { color: #856404; }
        .service-status-box.danger .info .status { color: #721c24; }

        /* Service Grid */
        .service-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .service-grid .item {
            background: #f8f6f4;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            border-left: 3px solid #28a745;
        }
        .service-grid .item.danger { border-left-color: #dc3545; }
        .service-grid .item.warning { border-left-color: #ffc107; }
        .service-grid .item .name { 
            font-size: 11px; 
            color: #888; 
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-weight: 600;
        }
        .service-grid .item .countdown { 
            font-size: 20px; 
            font-weight: 700; 
            color: #333;
            margin-top: 2px;
        }
        .service-grid .item .countdown.danger { color: #dc3545; }
        .service-grid .item .countdown.warning { color: #856404; }
        .service-grid .item .countdown.ok { color: #28a745; }
        .service-grid .item .status-text {
            font-size: 10px;
            font-weight: 600;
            margin-top: 2px;
        }
        .service-grid .item .status-text.ok { color: #28a745; }
        .service-grid .item .status-text.warning { color: #856404; }
        .service-grid .item .status-text.danger { color: #dc3545; }
        .service-grid .item .due-label {
            font-size: 9px;
            color: #aaa;
            margin-top: 1px;
        }
        
        .stat-grid-dash {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            border: 1px solid #e5e0db;
        }
        .stat-card .icon { font-size: 20px; filter: grayscale(1); opacity: 0.5; display: block; margin-bottom: 4px; }
        .stat-card .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 22px; font-weight: 700; color: #E6481F; }
        .stat-card .sub { font-size: 12px; color: #888; margin-top: 2px; }
        .dash-section {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e5e0db;
        }
        .dash-section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        .dash-section-title .icon { filter: grayscale(1); opacity: 0.5; margin-right: 4px; }
        .hidden { display: none; }
        #importInput { display: none; }
        .record-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
    <div>
        <h1>🚜 Kubota B5000</h1>
        <div class="sub">Maintenance Tracker</div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
        <span class="badge-status good" id="headerStatus">✅ Good</span>
        <div class="header-actions">
            <button class="btn-sm" onclick="exportData()">📤</button>
            <button class="btn-sm" onclick="document.getElementById('importInput').click()">📥</button>
            <input type="file" id="importInput" accept=".json" onchange="importData(event)">
        </div>
    </div>
</div>

<div class="tabs" id="tabContainer">
    <button class="tab active" data-tab="dashboard"><span class="icon">📊</span> Dashboard</button>
    <button class="tab" data-tab="hours"><span class="icon">⏱</span> Hours</button>
    <button class="tab" data-tab="service"><span class="icon">🔧</span> Service</button>
    <button class="tab" data-tab="fuel"><span class="icon">⛽</span> Fuel</button>
    <button class="tab" data-tab="fluids"><span class="icon">💧</span> Fluids</button>
</div>

<!-- DASHBOARD -->
<div id="panel-dashboard" class="panel active">
    <div id="dash-content"></div>
</div>

<!-- HOURS -->
<div id="panel-hours" class="panel">
    <div class="card">
        <div class="card-title"><span class="icon">⏱</span> Log Hours</div>
        <div class="form-row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="h-date">
            </div>
            <div class="form-group">
                <label>Attachment</label>
                <select id="h-attach">
                    <option value="none">No attachment</option>
                    <option value="mower">Mower</option>
                    <option value="tiller">Rotary tiller</option>
                    <option value="bed-raiser">Bed raiser</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Hours Worked (this session)</label>
                <input type="number" id="h-session" step="0.1" placeholder="e.g. 2.5">
            </div>
            <div class="form-group">
                <label>Tractor Hours (total reading) <span class="auto-badge">auto</span></label>
                <input type="number" id="h-tractor" step="0.1" placeholder="Auto-calculated" readonly>
                <div class="latest-reading" id="h-current-reading">Total hours: 0.0 hrs</div>
            </div>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
            <label>Notes</label>
            <textarea id="h-notes" rows="2" placeholder="Any observations..."></textarea>
        </div>
        <button class="btn" onclick="addHours()">➕ Add Entry</button>
    </div>
    <div id="hours-list"></div>
</div>

<!-- SERVICE -->
<div id="panel-service" class="panel">
    <div class="card">
        <div class="card-title"><span class="icon">🔧</span> Log Service</div>
        <div class="form-row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="s-date">
            </div>
            <div class="form-group">
                <label>Service Type</label>
                <select id="s-type">
                    <option value="engine_oil">🛢️ Engine Oil Change</option>
                    <option value="engine_oil_filter">🔧 Engine Oil Filter</option>
                    <option value="hydraulic_fluid">💧 Hydraulic & Trans Fluid</option>
                    <option value="hydraulic_filter">🔧 Hydraulic/Trans Filter</option>
                    <option value="hydraulic_strainer">🔍 Hydraulic Strainer Clean</option>
                    <option value="fuel_filter">⛽ Fuel Filter</option>
                    <option value="air_filter">🌬️ Air Filter</option>
                    <option value="tractor_grease">🧴 Tractor Grease Points</option>
                    <option value="mower_grease">🌿 Mower Attachment Grease</option>
                    <option value="break_in">🔰 Break-In Service (50 hrs)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Cost (THB)</label>
                <input type="number" id="s-cost" placeholder="0">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Hours at Service <span class="auto-badge">auto</span></label>
                <input type="number" id="s-hours" step="0.1" readonly class="auto-filled">
                <div style="font-size:11px; color:#888; margin-top:2px;">⏺ Current: <span id="s-hours-display">0.0</span> hrs</div>
            </div>
            <div class="form-group">
                <label>Performed By</label>
                <input type="text" id="s-by" placeholder="Self / Dealer">
            </div>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
            <label>Notes</label>
            <textarea id="s-notes" rows="2" placeholder="Parts used, observations..."></textarea>
        </div>
        <button class="btn" onclick="addService()">➕ Add Service Record</button>
    </div>
    <div id="service-list"></div>
</div>

<!-- FUEL -->
<div id="panel-fuel" class="panel">
    <div class="card">
        <div class="card-title"><span class="icon">⛽</span> Log Fuel</div>
        <div class="form-row three">
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="f-date">
            </div>
            <div class="form-group">
                <label>Litres</label>
                <input type="number" id="f-litres" step="0.1" placeholder="e.g. 15.5">
            </div>
            <div class="form-group">
                <label>Price/L (THB)</label>
                <input type="number" id="f-price" step="0.01" placeholder="e.g. 32.50">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Notes</label>
                <input type="text" id="f-notes" placeholder="e.g. full tank">
            </div>
            <div class="form-group" style="display:flex; align-items:flex-end; justify-content:flex-end;">
                <div style="font-size:12px; color:#888; padding-bottom:4px;">⏺ Total hours: <span id="f-hours-display">0.0</span> hrs</div>
            </div>
        </div>
        <button class="btn" onclick="addFuel()">➕ Add Fuel Record</button>
    </div>
    <div id="fuel-list"></div>
</div>

<!-- FLUIDS -->
<div id="panel-fluids" class="panel">
    <div class="card">
        <div class="card-title"><span class="icon">💧</span> Log Fluid Change</div>
        <div class="form-row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="fl-date">
            </div>
            <div class="form-group">
                <label>Fluid Type</label>
                <select id="fl-type">
                    <option>Engine oil</option>
                    <option>Hydraulic oil</option>
                    <option>Coolant</option>
                    <option>Gear oil</option>
                </select>
            </div>
        </div>
        <div class="form-row three">
            <div class="form-group">
                <label>Quantity (L)</label>
                <input type="number" id="fl-qty" step="0.1" placeholder="e.g. 2.5">
            </div>
            <div class="form-group">
                <label>Cost (THB)</label>
                <input type="number" id="fl-cost" placeholder="0">
            </div>
            <div class="form-group">
                <label>Brand / Spec</label>
                <input type="text" id="fl-brand" placeholder="e.g. Castrol 10W-30">
            </div>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
            <div style="font-size:12px; color:#888;">⏺ Total hours: <span id="fl-hours-display">0.0</span> hrs</div>
        </div>
        <button class="btn" onclick="addFluid()">➕ Add Fluid Record</button>
    </div>
    <div id="fluid-list"></div>
</div>

<script>
// ============================================
// DATA
// ============================================
const KEY = 'kubota_tracker_v2';
let data = JSON.parse(localStorage.getItem(KEY) || 'null') || {
    hours: [], service: [], fuel: [], fluids: []
};

// ============================================
// SERVICE INTERVALS (Hours)
// ============================================
const SERVICE_INTERVALS = {
    'engine_oil': { interval: 125, name: 'Engine Oil Change', emoji: '🛢️' },
    'engine_oil_filter': { interval: 125, name: 'Engine Oil Filter', emoji: '🔧' },
    'hydraulic_fluid': { interval: 350, name: 'Hydraulic & Trans Fluid', emoji: '💧' },
    'hydraulic_filter': { interval: 250, name: 'Hydraulic/Trans Filter', emoji: '🔧' },
    'hydraulic_strainer': { interval: 350, name: 'Hydraulic Strainer', emoji: '🔍' },
    'fuel_filter': { interval: 350, name: 'Fuel Filter', emoji: '⛽' },
    'air_filter': { interval: 400, name: 'Air Filter', emoji: '🌬️' },
    'tractor_grease': { interval: 50, name: 'Tractor Grease', emoji: '🧴' },
    'mower_grease': { interval: 38, name: 'Mower Grease', emoji: '🌿' },
    'break_in': { interval: 50, name: 'Break-In Service', emoji: '🔰' }
};

function save() {
    localStorage.setItem(KEY, JSON.stringify(data));
    renderAll();
}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timeout);
    el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
}

function getLatestHours() {
    if (!data.hours.length) return 0;
    let maxHours = 0;
    for (let i = 0; i < data.hours.length; i++) {
        const val = Number(data.hours[i].tractor) || 0;
        if (val > maxHours) maxHours = val;
    }
    return maxHours;
}

function getTotalAttachmentHours(attachName) {
    return data.hours
        .filter(h => h.attach === attachName)
        .reduce((sum, h) => sum + (Number(h.session) || 0), 0);
}

function fmt(n) { return Number(n).toFixed(1); }
function fmtCost(n) { return '฿' + Number(n).toLocaleString(); }
function today() { return new Date().toISOString().split('T')[0]; }
function attachLabel(v) {
    const map = { none:'No attachment', mower:'Mower', tiller:'Rotary tiller', 'bed-raiser':'Bed raiser' };
    return map[v] || v;
}

// ============================================
// SERVICE TRACKING
// ============================================
function getServiceStatus(serviceType, currentHours) {
    const config = SERVICE_INTERVALS[serviceType];
    if (!config) return { dueHours: null, hoursToService: null, isOverdue: false, isWarning: false, lastDone: null, lastHours: 0 };
    
    const records = data.service
        .filter(s => s.type === serviceType)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    
    if (records.length === 0) {
        return { 
            dueHours: null, 
            hoursToService: null, 
            isOverdue: false, 
            isWarning: false, 
            lastDone: null, 
            lastHours: 0,
            neverDone: true
        };
    }
    
    const lastService = records[0];
    const lastHours = Number(lastService.hours) || 0;
    const dueHours = lastHours + config.interval;
    const hoursToService = Math.max(0, dueHours - currentHours);
    const isOverdue = dueHours < currentHours;
    const isWarning = !isOverdue && hoursToService < 25;
    
    return { 
        dueHours, 
        hoursToService, 
        isOverdue, 
        isWarning, 
        lastDone: lastService,
        lastHours: lastHours,
        neverDone: false
    };
}

function getNextServiceDue(currentHours) {
    let nextService = null;
    let earliestDue = Infinity;
    let hasOverdue = false;
    
    for (const [type, config] of Object.entries(SERVICE_INTERVALS)) {
        if (type === 'break_in') {
            const hasBreakIn = data.service.some(s => s.type === 'break_in');
            if (hasBreakIn) continue;
        }
        const status = getServiceStatus(type, currentHours);
        
        if (status.neverDone) {
            if (!nextService || nextService.neverDone === false) {
                nextService = { type, ...config, ...status };
                earliestDue = 0;
                hasOverdue = true;
            }
            continue;
        }
        
        if (status.isOverdue) {
            hasOverdue = true;
            if (!nextService || nextService.isOverdue === false || status.dueHours < earliestDue) {
                nextService = { type, ...config, ...status };
                earliestDue = status.dueHours;
            }
        } else if (!hasOverdue && status.dueHours && status.dueHours < earliestDue) {
            earliestDue = status.dueHours;
            nextService = { type, ...config, ...status };
        }
    }
    
    return nextService;
}

function updateHeaderStatus() {
    const lastH = getLatestHours();
    const nextService = getNextServiceDue(lastH);
    
    const el = document.getElementById('headerStatus');
    if (nextService && nextService.isOverdue) {
        el.textContent = '🔴 Overdue';
        el.className = 'badge-status danger';
    } else if (nextService && nextService.isWarning) {
        el.textContent = '⚠️ Soon';
        el.className = 'badge-status warning';
    } else {
        el.textContent = '✅ Good';
        el.className = 'badge-status good';
    }
}

// ============================================
// SETUP SESSION INPUT LISTENER
// ============================================
function setupSessionListener() {
    const sessionInput = document.getElementById('h-session');
    const tractorInput = document.getElementById('h-tractor');
    const readingDisplay = document.getElementById('h-current-reading');
    
    if (sessionInput && tractorInput) {
        const newSession = sessionInput.cloneNode(true);
        sessionInput.parentNode.replaceChild(newSession, sessionInput);
        
        newSession.addEventListener('input', function() {
            const sessionVal = Number(this.value) || 0;
            const currentTotal = getLatestHours();
            const newTotal = currentTotal + sessionVal;
            const tractorField = document.getElementById('h-tractor');
            const reading = document.getElementById('h-current-reading');
            
            if (sessionVal > 0) {
                tractorField.value = fmt(newTotal);
                if (reading) {
                    reading.textContent = 'Total hours: ' + fmt(newTotal) + ' hrs (after this session)';
                }
            } else {
                const latest = getLatestHours();
                tractorField.value = latest > 0 ? fmt(latest) : '';
                if (reading) {
                    reading.textContent = 'Total hours: ' + (latest > 0 ? fmt(latest) : '0.0') + ' hrs';
                }
            }
        });
    }
}

// ============================================
// PHOTO HANDLING
// ============================================
function addPhotoToRecord(recordType, recordIndex, base64) {
    if (!data[recordType][recordIndex]) return;
    if (!data[recordType][recordIndex].photos) {
        data[recordType][recordIndex].photos = [];
    }
    data[recordType][recordIndex].photos.push(base64);
    save();
    toast('Photo added!');
}

function removePhoto(recordType, recordIndex, photoIndex) {
    if (!data[recordType][recordIndex]) return;
    data[recordType][recordIndex].photos.splice(photoIndex, 1);
    save();
    renderAll();
}

function takePhoto(recordType, recordIndex) {
    // For web/iPhone: use file input
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            addPhotoToRecord(recordType, recordIndex, ev.target.result);
            renderAll();
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

// ============================================
// RENDER DASHBOARD
// ============================================
function renderDashboard() {
    const el = document.getElementById('dash-content');
    const lastH = getLatestHours();
    const mowerH = getTotalAttachmentHours('mower');
    const tillerH = getTotalAttachmentHours('tiller');
    const bedH = getTotalAttachmentHours('bed-raiser');
    const totalFuel = data.fuel.reduce((s, f) => s + (Number(f.litres) || 0), 0);
    const totalFuelCost = data.fuel.reduce((s, f) => s + (Number(f.litres) || 0) * (Number(f.price) || 0), 0);
    const totalFluidCost = data.fluids.reduce((s, f) => s + (Number(f.cost) || 0), 0);
    const totalServiceCost = data.service.reduce((s, s2) => s + (Number(s2.cost) || 0), 0);
    const totalAllCost = totalFuelCost + totalFluidCost + totalServiceCost;
    const costPerHour = lastH > 0 ? totalAllCost / lastH : 0;

    const nextService = getNextServiceDue(lastH);
    
    let statusClass = 'ok';
    let statusText = '✅ All Services Good';
    let statusDetail = 'No service due soon';
    let statusIcon = '✅';
    let nextServiceName = 'None due';
    let nextServiceCountdown = '—';
    
    if (nextService) {
        if (nextService.neverDone) {
            nextServiceName = nextService.emoji + ' ' + nextService.name;
            statusClass = 'warning';
            statusText = '⚠️ Service Not Done';
            statusDetail = nextService.name + ' has never been performed';
            statusIcon = '⚠️';
            nextServiceCountdown = 'Not done';
        } else if (nextService.isOverdue) {
            nextServiceName = nextService.emoji + ' ' + nextService.name;
            statusClass = 'danger';
            statusText = '🔴 Service Overdue!';
            statusDetail = nextService.name + ' overdue by ' + fmt(lastH - nextService.dueHours) + ' hours';
            statusIcon = '🔴';
            nextServiceCountdown = 'Overdue';
        } else if (nextService.isWarning) {
            statusClass = 'warning';
            statusText = '⚠️ Service Due Soon';
            statusDetail = nextService.name + ' due in ' + fmt(nextService.hoursToService) + ' hours';
            statusIcon = '⚠️';
            nextServiceName = nextService.emoji + ' ' + nextService.name;
            nextServiceCountdown = fmt(nextService.hoursToService) + ' hrs';
        } else if (nextService.hoursToService !== null) {
            nextServiceName = nextService.emoji + ' ' + nextService.name;
            statusDetail = nextService.name + ' due in ' + fmt(nextService.hoursToService) + ' hours';
            nextServiceCountdown = fmt(nextService.hoursToService) + ' hrs';
        }
    }

    let serviceGridHTML = '';
    for (const [type, config] of Object.entries(SERVICE_INTERVALS)) {
        if (type === 'break_in') {
            const hasBreakIn = data.service.some(s => s.type === 'break_in');
            if (hasBreakIn) continue;
        }
        const status = getServiceStatus(type, lastH);
        let statusTextClass = 'ok';
        let statusLabel = '✅ OK';
        let countdownDisplay = '—';
        let countdownClass = 'ok';
        let lastDoneText = '';
        
        if (status.neverDone) {
            statusTextClass = 'warning';
            statusLabel = '⚠️ Not done';
            countdownDisplay = '—';
            countdownClass = 'warning';
        } else if (status.isOverdue) {
            statusTextClass = 'danger';
            statusLabel = '🔴 Overdue';
            countdownDisplay = 'Overdue';
            countdownClass = 'danger';
            lastDoneText = 'Last done: ' + fmt(status.lastHours) + ' hrs';
        } else if (status.isWarning) {
            statusTextClass = 'warning';
            statusLabel = '⚠️ Soon';
            countdownDisplay = fmt(status.hoursToService) + ' hrs';
            countdownClass = 'warning';
            lastDoneText = 'Last done: ' + fmt(status.lastHours) + ' hrs';
        } else if (status.hoursToService !== null) {
            countdownDisplay = fmt(status.hoursToService) + ' hrs';
            countdownClass = 'ok';
            lastDoneText = 'Last done: ' + fmt(status.lastHours) + ' hrs';
        }
        
        serviceGridHTML += `
            <div class="item ${statusTextClass}">
                <div class="name">${config.emoji} ${config.name}</div>
                <div class="countdown ${countdownClass}">${countdownDisplay}</div>
                ${lastDoneText ? `<div class="due-label">${lastDoneText}</div>` : ''}
                <div class="status-text ${statusTextClass}">${statusLabel}</div>
            </div>
        `;
    }

    el.innerHTML = `
        <div class="stat-grid-dash">
            <div class="stat-card">
                <span class="icon">⏱️</span>
                <div class="label">Total Hours</div>
                <div class="value">${fmt(lastH)}</div>
                <div class="sub">hrs accumulated</div>
            </div>
            <div class="stat-card">
                <span class="icon">⛽</span>
                <div class="label">Fuel Used</div>
                <div class="value">${fmt(totalFuel)}</div>
                <div class="sub">Litres</div>
            </div>
            <div class="stat-card">
                <span class="icon">💰</span>
                <div class="label">Total Cost</div>
                <div class="value">${fmtCost(totalAllCost)}</div>
                <div class="sub">${fmtCost(costPerHour)}/hr</div>
            </div>
            <div class="stat-card">
                <span class="icon">🔧</span>
                <div class="label">Next Service</div>
                <div class="value" style="${nextService && nextService.isOverdue ? 'color:#dc3545' : ''}">${nextServiceCountdown}</div>
                <div class="sub">${nextServiceName}</div>
            </div>
        </div>

        <div class="dash-section">
            <div class="dash-section-title"><span class="icon">🔧</span> Hours by Attachment</div>
            <div class="hours-attachment"><span>Mower</span><span class="value">${fmt(mowerH)} hrs</span></div>
            <div class="hours-attachment"><span>Tiller</span><span class="value">${fmt(tillerH)} hrs</span></div>
            <div class="hours-attachment"><span>Bed Raiser</span><span class="value">${fmt(bedH)} hrs</span></div>
        </div>

        <div class="dash-section">
            <div class="dash-section-title"><span class="icon">💰</span> Cost Summary</div>
            <div class="cost-item"><span><span class="icon">⛽</span> Fuel</span><span>${fmtCost(totalFuelCost)}</span></div>
            <div class="cost-item"><span><span class="icon">🔧</span> Service</span><span>${fmtCost(totalServiceCost)}</span></div>
            <div class="cost-item"><span><span class="icon">💧</span> Fluids</span><span>${fmtCost(totalFluidCost)}</span></div>
            <div class="cost-total"><span>TOTAL SPENT</span><span class="amount">${fmtCost(totalAllCost)}</span></div>
        </div>

        <div class="dash-section">
            <div class="dash-section-title"><span class="icon">🔧</span> Service Status</div>
            <div class="service-status-box ${statusClass}">
                <span class="icon">${statusIcon}</span>
                <div class="info">
                    <div class="status">${statusText}</div>
                    <div class="detail">${statusDetail}</div>
                </div>
            </div>
            <div class="service-grid">
                ${serviceGridHTML}
            </div>
        </div>
    `;
}

// ============================================
// EXPORT / IMPORT
// ============================================
function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kubota_tracker_backup_' + today() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Data exported ✅');
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (imported.hours && imported.service && imported.fuel && imported.fluids) {
                if (!confirm('This will REPLACE all current data. Continue?')) return;
                data = imported;
                save();
                toast('Data imported successfully ✅');
            } else {
                toast('Invalid file format ❌');
            }
        } catch(err) {
            toast('Error reading file ❌');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}
